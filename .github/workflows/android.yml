name: PocketUmp Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Debug APK
        # We add --no-daemon to prevent the "Daemon" crash on virtual servers
        run: gradle assembleDebug --no-daemon
